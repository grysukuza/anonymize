<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Anonymizer</title>
  <style>
    :root {
      /* Claude-inspired palette */
      --bg: #faf9f5;
      --panel: #ffffff;
      --panel-2: #f5f4ee;
      --border: #e8e6dd;
      --border-strong: #d8d5c8;
      --text: #1f1e1c;
      --muted: #6f6e69;
      --accent: #c96442;       /* Claude coral / terracotta */
      --accent-hover: #b4543494;
      --accent-strong: #a84b2f;
      --accent-soft: #f4e7e0;
      --success: #3f8f5b;
      --danger: #c0392b;
      --shadow: 0 1px 2px rgba(20, 19, 17, 0.04), 0 6px 24px rgba(20, 19, 17, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 16px;
      line-height: 1.5;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      margin: 0 0 10px;
      font-family: ui-serif, Georgia, "Times New Roman", Cambria, serif;
      font-size: 2.6rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 1.02rem;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 800px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    textarea, .output {
      width: 100%;
      min-height: 280px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 14px;
      font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Code", monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.14);
    }

    .output {
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      margin: 0;
    }

    .output.placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 28px 0;
      flex-wrap: wrap;
    }

    input[type="text"], input[type="password"], input[type="number"], #username, #password {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border-strong);
      background: var(--panel);
      color: var(--text);
      font-size: 0.9rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.14);
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 26px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    button:hover:not(:disabled) {
      background: var(--accent-strong);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.secondary {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border-strong);
    }

    button.secondary:hover:not(:disabled) {
      background: var(--panel-2);
      border-color: var(--accent);
    }

    .status {
      text-align: center;
      min-height: 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .examples {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }

    .example-chip {
      background: var(--panel);
      color: var(--muted);
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .example-chip:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    label { font-size: 0.92rem; color: var(--text); line-height: 2; }
    input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; vertical-align: middle; margin-right: 4px; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 40px;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Text Anonymizer</h1>
      <p class="subtitle">Detect and replace personally identifiable information using Microsoft Presidio</p>
    </header>



    <div class="panel" style="margin-bottom: 16px;">
      <div class="panel-header">
        <span class="panel-title">Login</span>
        <span class="badge" id="authBadge">signed out</span>
      </div>
      <div class="controls" style="justify-content: flex-start; margin: 0;">
        <input id="username" placeholder="Username" value="admin" />
        <input id="password" type="password" placeholder="Password" value="anonymize123" />
        <button id="loginBtn" class="secondary">Login</button>
        <button id="logoutBtn" class="secondary" disabled>Logout</button>
      </div>
    </div>

    <div class="examples">
      <span style="font-size: 0.8rem; color: var(--muted); align-self: center;">Try an example:</span>
      <button class="example-chip" data-example="medical">Medical record</button>
      <button class="example-chip" data-example="contact">Contact info</button>
      <button class="example-chip" data-example="financial">Financial</button>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Original Text</span>
          <span class="badge" id="charCount">0 chars</span>
        </div>
        <textarea id="input" placeholder="Paste or type text containing names, emails, phone numbers, addresses, or other PII..."></textarea>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Anonymized Text</span>
          <span class="badge" id="outputBadge">awaiting input</span>
        </div>
        <pre class="output placeholder" id="output">The anonymized result will appear here.</pre>
      </div>
    </div>


    <div class="panel" style="margin-top: 16px;">
      <div class="panel-header">
        <span class="panel-title">Options</span>
      </div>
      <label><input type="checkbox" id="adjustData"> Adjust data markers</label><br/>
      <label><input type="checkbox" id="adjustNumbers"> Adjust numbers</label>
      <input id="numberDelta" type="number" value="1" style="width:80px;margin-left:8px;" />
      <br/>
      <label><input type="checkbox" id="removeUnusualWords"> Take out unusual words</label>
    </div>

    <div class="controls">
      <button id="anonymizeBtn">Anonymize</button>
      <button id="clearBtn" class="secondary">Clear</button>
      <button id="copyBtn" class="secondary" disabled>Copy result</button>
    </div>

    <div class="status" id="status"></div>

    <footer>
      Powered by <a href="https://microsoft.github.io/presidio/" target="_blank" rel="noopener">Microsoft Presidio</a>
      &nbsp;·&nbsp;
      <a href="/health" target="_blank">Health</a>
    </footer>
  </div>

  <script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const anonymizeBtn = document.getElementById("anonymizeBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const status = document.getElementById("status");
    const charCount = document.getElementById("charCount");
    const outputBadge = document.getElementById("outputBadge");
    const authBadge = document.getElementById("authBadge");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const adjustData = document.getElementById("adjustData");
    const adjustNumbers = document.getElementById("adjustNumbers");
    const numberDelta = document.getElementById("numberDelta");
    const removeUnusualWords = document.getElementById("removeUnusualWords");

    const EXAMPLES = {
      medical: "Patient John Smith, born on 01/02/1980, was admitted to St. Mary's Hospital on 03/15/2024. His SSN is 123-45-6789 and medical record number is MRN789012. He can be reached at john.smith@example.com or 555-123-4567.",
      contact: "Hi, my name is Sarah Johnson. You can email me at sarah.j@company.com or call me at (415) 555-7890. I live at 742 Evergreen Terrace, Springfield.",
      financial: "Please charge my credit card 4111-1111-1111-1111 (exp 12/27). My account holder name is Michael Brown, SSN 987-65-4321, and my IBAN is GB82WEST12345698765432."
    };

    document.querySelectorAll(".example-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        input.value = EXAMPLES[chip.dataset.example] || "";
        updateCount();
    refreshSession();
        input.focus();
      });
    });

    function updateCount() {
      charCount.textContent = `${input.value.length} chars`;
    }

    function setStatus(msg, type = "") {
      status.className = "status" + (type ? " " + type : "");
      status.innerHTML = msg;
    }

    function setOutput(text, isPlaceholder = false) {
      output.textContent = text;
      output.classList.toggle("placeholder", isPlaceholder);
    }

    input.addEventListener("input", updateCount);

    async function refreshSession() {
      const res = await fetch("/session");
      const data = await res.json();
      const loggedIn = !!data.authenticated;
      authBadge.textContent = loggedIn ? `signed in as ${data.username}` : "signed out";
      loginBtn.disabled = loggedIn;
      logoutBtn.disabled = !loggedIn;
      anonymizeBtn.disabled = !loggedIn;
    }

    loginBtn.addEventListener("click", async () => {
      try {
        const res = await fetch("/login", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({username: username.value, password: password.value})});
        if (!res.ok) throw new Error("Login failed");
        setStatus("Logged in.", "success");
        await refreshSession();
      } catch (e) {
        setStatus(e.message, "error");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await fetch("/logout", {method:"POST"});
      setStatus("Logged out.", "success");
      await refreshSession();
    });

    clearBtn.addEventListener("click", () => {
      input.value = "";
      setOutput("The anonymized result will appear here.", true);
      outputBadge.textContent = "awaiting input";
      copyBtn.disabled = true;
      setStatus("");
      updateCount();
    refreshSession();
      input.focus();
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.textContent);
        setStatus("Copied to clipboard.", "success");
      } catch {
        setStatus("Could not copy to clipboard.", "error");
      }
    });

    anonymizeBtn.addEventListener("click", async () => {
      const text = input.value.trim();
      if (!text) {
        setStatus("Please enter some text first.", "error");
        input.focus();
        return;
      }

      anonymizeBtn.disabled = true;
      setStatus('<span class="spinner"></span>Analyzing and anonymizing...');
      outputBadge.textContent = "processing";

      try {
        const res = await fetch("/anonymize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, adjust_data: adjustData.checked, adjust_numbers: adjustNumbers.checked, number_delta: Number(numberDelta.value || 0), remove_unusual_words: removeUnusualWords.checked })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server returned ${res.status}`);
        }

        const data = await res.json();
        setOutput(data.text || "");
        outputBadge.textContent = "done";
        copyBtn.disabled = false;
        setStatus("Anonymization complete.", "success");
      } catch (e) {
        setOutput("Error: " + e.message, true);
        outputBadge.textContent = "error";
        setStatus(e.message || "Something went wrong.", "error");
      } finally {
        anonymizeBtn.disabled = false;
      }
    });

    input.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        anonymizeBtn.click();
      }
    });

    updateCount();
    refreshSession();
  </script>
</body>
</html>
