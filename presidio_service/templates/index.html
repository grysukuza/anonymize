<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Anonymizer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273449;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 0.95rem;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 800px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
    }

    textarea, .output {
      width: 100%;
      min-height: 280px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Code", monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .output {
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      margin: 0;
    }

    .output.placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 24px 0;
      flex-wrap: wrap;
    }

    button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover:not(:disabled) {
      background: var(--panel-2);
    }

    .status {
      text-align: center;
      min-height: 24px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .examples {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .example-chip {
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .example-chip:hover {
      background: var(--border);
      color: var(--text);
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 32px;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Text Anonymizer</h1>
      <p class="subtitle">Detect and replace personally identifiable information using Microsoft Presidio</p>
    </header>

    <div class="examples">
      <span style="font-size: 0.8rem; color: var(--muted); align-self: center;">Try an example:</span>
      <button class="example-chip" data-example="medical">Medical record</button>
      <button class="example-chip" data-example="contact">Contact info</button>
      <button class="example-chip" data-example="financial">Financial</button>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Original Text</span>
          <span class="badge" id="charCount">0 chars</span>
        </div>
        <textarea id="input" placeholder="Paste or type text containing names, emails, phone numbers, addresses, or other PII..."></textarea>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Anonymized Text</span>
          <span class="badge" id="outputBadge">awaiting input</span>
        </div>
        <pre class="output placeholder" id="output">The anonymized result will appear here.</pre>
      </div>
    </div>

    <div class="controls">
      <button id="anonymizeBtn">Anonymize</button>
      <button id="clearBtn" class="secondary">Clear</button>
      <button id="copyBtn" class="secondary" disabled>Copy result</button>
    </div>

    <div class="status" id="status"></div>

    <footer>
      Powered by <a href="https://microsoft.github.io/presidio/" target="_blank" rel="noopener">Microsoft Presidio</a>
      &nbsp;·&nbsp;
      <a href="/health" target="_blank">Health</a>
    </footer>
  </div>

  <script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const anonymizeBtn = document.getElementById("anonymizeBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const status = document.getElementById("status");
    const charCount = document.getElementById("charCount");
    const outputBadge = document.getElementById("outputBadge");

    const EXAMPLES = {
      medical: "Patient John Smith, born on 01/02/1980, was admitted to St. Mary's Hospital on 03/15/2024. His SSN is 123-45-6789 and medical record number is MRN789012. He can be reached at john.smith@example.com or 555-123-4567.",
      contact: "Hi, my name is Sarah Johnson. You can email me at sarah.j@company.com or call me at (415) 555-7890. I live at 742 Evergreen Terrace, Springfield.",
      financial: "Please charge my credit card 4111-1111-1111-1111 (exp 12/27). My account holder name is Michael Brown, SSN 987-65-4321, and my IBAN is GB82WEST12345698765432."
    };

    document.querySelectorAll(".example-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        input.value = EXAMPLES[chip.dataset.example] || "";
        updateCount();
        input.focus();
      });
    });

    function updateCount() {
      charCount.textContent = `${input.value.length} chars`;
    }

    function setStatus(msg, type = "") {
      status.className = "status" + (type ? " " + type : "");
      status.innerHTML = msg;
    }

    function setOutput(text, isPlaceholder = false) {
      output.textContent = text;
      output.classList.toggle("placeholder", isPlaceholder);
    }

    input.addEventListener("input", updateCount);

    clearBtn.addEventListener("click", () => {
      input.value = "";
      setOutput("The anonymized result will appear here.", true);
      outputBadge.textContent = "awaiting input";
      copyBtn.disabled = true;
      setStatus("");
      updateCount();
      input.focus();
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.textContent);
        setStatus("Copied to clipboard.", "success");
      } catch {
        setStatus("Could not copy to clipboard.", "error");
      }
    });

    anonymizeBtn.addEventListener("click", async () => {
      const text = input.value.trim();
      if (!text) {
        setStatus("Please enter some text first.", "error");
        input.focus();
        return;
      }

      anonymizeBtn.disabled = true;
      setStatus('<span class="spinner"></span>Analyzing and anonymizing...');
      outputBadge.textContent = "processing";

      try {
        const res = await fetch("/anonymize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server returned ${res.status}`);
        }

        const data = await res.json();
        setOutput(data.text || "");
        outputBadge.textContent = "done";
        copyBtn.disabled = false;
        setStatus("Anonymization complete.", "success");
      } catch (e) {
        setOutput("Error: " + e.message, true);
        outputBadge.textContent = "error";
        setStatus(e.message || "Something went wrong.", "error");
      } finally {
        anonymizeBtn.disabled = false;
      }
    });

    input.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        anonymizeBtn.click();
      }
    });

    updateCount();
  </script>
</body>
</html>
